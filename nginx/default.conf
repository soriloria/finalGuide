# ----------------------------------------
# HTTP: редірект на HTTPS
# ----------------------------------------
server {
    listen 80;
    server_name touristguide.work www.touristguide.work;

    # Редірект на HTTPS
    return 301 https://$host$request_uri;
}


# ----------------------------------------
# HTTPS сервер
# ----------------------------------------
server {
    listen 443 ssl;
    server_name touristguide.work www.touristguide.work;

    # SSL сертифікати (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/touristguide.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/touristguide.work/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # API Django
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Медіа файли
    location /media/ {
        alias /app/media/;
    }

    # Секретний доступ / адмінка
    location /secure-management-3228js9/ {
        proxy_pass http://backend:8000/secure-management-3228js9/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React фронтенд
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Активація користувача (React)
    location /activate/ {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Скидання пароля (React)
    location /reset-password/ {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
