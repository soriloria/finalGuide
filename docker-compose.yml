version: '3.9'

services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./guidedb_backup.dump:/guidedb_backup.dump:ro
    restart: always

  backend:
    build: ./TouristGuide
    env_file:
      - .env
    depends_on:
      - db
    expose:
      - "8000"
    restart: always

  frontend:
    build: ./ui
    expose:
      - "80"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./TouristGuide/media:/app/media
      - ./TouristGuide/static:/app/static
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
